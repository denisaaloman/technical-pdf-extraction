<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extractor Tabele Tehnice</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <div class="masthead">
      <h1>Extractor Tabele Tehnice</h1>
      <span class="tag">PDF → CSV / XLSX</span>
    </div>

    <div id="dropzone" class="dropzone">
      <p>Trage documentele PDF aici, sau apasă pentru a le selecta</p>
      <p class="hint">Documente scanate sau digitale — ambele sunt suportate</p>
      <input id="fileInput" type="file" accept="application/pdf" multiple hidden />
    </div>

    <div id="docsPanel" class="panel" style="display: none">
      <ul id="docList" class="doc-list"></ul>

      <div class="controls-row">
        <div class="format-toggle">
          <button id="formatXlsxBtn" class="selected">Excel</button>
          <button id="formatCsvBtn">CSV</button>
        </div>
        <div style="display: flex; gap: 12px">
          <button id="extractBtn" class="primary-btn">Extrage (0)</button>
          <button id="exportBtn" class="primary-btn" style="background: var(--ink)" disabled>
            Descarcă Excel
          </button>
        </div>
      </div>
    </div>

    <div id="summaryPanel" class="panel summary-panel" style="display: none">
      <h2>Tabele găsite</h2>
      <div id="summaryContent"></div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" style="display: none">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modalName"></span>
        <button id="modalClose" class="modal-close" title="Închide">✕</button>
      </div>
      <iframe id="modalIframe" class="modal-iframe" title="Preview document"></iframe>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
